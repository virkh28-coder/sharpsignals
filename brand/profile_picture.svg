<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <!-- IG profile picture: 320×320 (IG renders down to 110×110, but uploads accept up to 1080×1080).
       This SVG renders crisply at any size. Background is bg-deep, mark is the accent-blue
       line-chart from the favicon, scaled up so it reads at 56px. -->

  <!-- Background -->
  <rect width="320" height="320" rx="32" fill="#0D1117"/>

  <!-- Subtle border to separate from feed -->
  <rect x="2" y="2" width="316" height="316" rx="30" fill="none" stroke="#161B22" stroke-width="2"/>

  <!-- Line-chart mark -->
  <g stroke="#79C0FF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 60 220 L 130 150 L 180 200 L 270 80"/>
  </g>

  <!-- Endpoint dot -->
  <circle cx="270" cy="80" r="14" fill="#79C0FF"/>

  <!-- Wordmark — kept tiny so the icon dominates at small sizes -->
  <text x="160" y="280"
        font-family="system-ui, -apple-system, 'Inter', sans-serif"
        font-size="20"
        font-weight="700"
        letter-spacing="3"
        fill="#79C0FF"
        text-anchor="middle">SHARPSIGNALS</text>
</svg>
